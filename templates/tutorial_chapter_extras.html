{% macro chapter_video_follow(chapter) %}
                    <div class="tutorial-lesson-video-wrap">
                        <p class="tutorial-lesson-video-label"><span class="material-icons-outlined" aria-hidden="true">play_circle</span> Watch lesson walkthrough <span class="tutorial-lesson-video-dur">~1 min</span></p>
                        <video class="tutorial-lesson-video" controls playsinline preload="metadata"
                               poster="{{ url_for('static', filename=chapter.poster) }}?v=2"
                               aria-label="{{ chapter.aria_label }}">
                            <source src="{{ url_for('static', filename='tutorial/videos/' ~ chapter.stem ~ '.mp4') }}?v=3" type="video/mp4">
                            <track kind="captions" src="{{ url_for('static', filename='tutorial/captions/' ~ chapter.stem ~ '.vtt') }}?v=3" srclang="en" label="English" default>
                        </video>
                    </div>
                    <nav class="tutorial-follow-along" aria-label="Follow along in the game">
                        <h4 class="tutorial-follow-along-title"><span class="material-icons-outlined" aria-hidden="true">open_in_new</span> Follow along in the game</h4>
                        <ul class="tutorial-follow-along-list">
                            {% for link in chapter.follow_links %}
                            <li>
                                <a href="{{ link.href }}" class="templatedivbutton tutorial-follow-btn" target="_blank" rel="noopener noreferrer">
                                    <span class="material-icons-outlined">north_east</span>{{ link.label }}
                                </a>
                            </li>
                            {% endfor %}
                        </ul>
                    </nav>
{% endmacro %}
