{% extends "layout.html" %}
{% block title %} Lore Map {% endblock %}
{% block body_class %}page-lore-map{% endblock %}

{% block head %}
<style>
    :root {
        --canvas-bg: linear-gradient(135deg, #1f506e 0%, #3e1b6a 100%);
        --grid-color: rgba(255, 255, 255, 0.1);
        --node-bg: rgba(30, 40, 60, 0.4);
        --node-border: rgba(255, 255, 255, 0.2);
        --node-glow: rgba(79, 195, 247, 0.3);
    }

    html, body.page-lore-map {
        margin: 0;
        overflow: hidden !important; /* Prevent normal scrolling */
        background: var(--canvas-bg) !important;
        height: 100vh;
    }
    
    /* Override standard AnO layout background */
    .templatecontainer, .navbarparent:has(.templatecontainer), #page-content-wrapper, .container-fluid, .body-content {
        background: transparent !important;
        padding: 0 !important;
        border: none !important;
        box-shadow: none !important;
        max-width: 100% !important;
        width: 100% !important;
        margin: 0 !important;
        min-height: 0 !important;
    }

    /* Hide the footer on this full-screen canvas */
    .footer, footer {
        display: none !important;
    }

    .templatedivtopper {
        position: fixed;
        top: 80px;
        left: 20px;
        z-index: 1000;
        background: rgba(10, 14, 20, 0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--node-border);
        padding: 10px 20px;
        border-radius: 8px;
        pointer-events: auto;
    }
    
    .templatedivtitle {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }
    
    .templatedivtitle .material-icons-outlined {
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* Infinite Canvas Viewport */
    #viewport {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        cursor: grab;
        /* Dot grid pattern */
        background-image: radial-gradient(var(--grid-color) 1px, transparent 1px);
        background-size: 40px 40px;
        background-position: 0 0;
    }

    #viewport:active {
        cursor: grabbing;
    }

    /* The actual canvas container that scales and translates */
    #canvas {
        position: absolute;
        top: 50%;
        left: 50%;
        transform-origin: 0 0;
        width: 0;
        height: 0;
    }

    .hex-tile {
        position: absolute;
        width: 173.2px; /* size * sqrt(3) */
        height: 200px;  /* size * 2 */
        background: var(--node-bg);
        clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 20px;
        color: #fff;
        backdrop-filter: blur(8px);
        transform: translate(-50%, -50%); /* Center on the calculated x,y */
        transition: all 0.2s ease;
        cursor: pointer;
    }

    .hex-tile:hover {
        background: rgba(79, 195, 247, 0.3);
        z-index: 10;
        transform: translate(-50%, -50%) scale(1.05);
    }

    .hex-tile h3 {
        margin: 0 0 5px 0;
        font-size: 0.9rem;
        color: #4fc3f7;
        font-weight: 700;
        text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }
    
    .hex-tile p {
        margin: 0;
        font-size: 0.75rem;
        color: #ccc;
    }
</style>
{% endblock %}

{% block body %}
<div class="templatedivtopper">
    <h1 class="templatedivtitle" style="margin: 0; font-size: 1.2rem;">
        <span class="material-icons-outlined iconlarge" style="vertical-align: middle;">public</span>
        Province Map
    </h1>
</div>

<div id="viewport">
    <div id="canvas">
        <!-- Provinces will be injected here dynamically via JS -->
    </div>
</div>

<div class="map-controls">
    <button class="control-btn" onclick="zoom(0.2)" title="Zoom In"><span class="material-icons-outlined">add</span></button>
    <button class="control-btn" onclick="zoom(-0.2)" title="Zoom Out"><span class="material-icons-outlined">remove</span></button>
    <button class="control-btn" onclick="resetView()" title="Recenter"><span class="material-icons-outlined">my_location</span></button>
</div>

<script>
    const viewport = document.getElementById('viewport');
    const canvas = document.getElementById('canvas');

    let scale = 1;
    let panX = 0;
    let panY = 0;
    
    let isDragging = false;
    let startX = 0;
    let startY = 0;

    function updateTransform() {
        canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
        viewport.style.backgroundPosition = `${panX}px ${panY}px`;
        viewport.style.backgroundSize = `${40 * scale}px ${40 * scale}px`;
    }

    viewport.addEventListener('mousedown', (e) => {
        if (e.target.closest('.hex-tile') || e.target.closest('.control-btn')) return;
        isDragging = true;
        startX = e.clientX - panX;
        startY = e.clientY - panY;
    });

    window.addEventListener('mouseup', () => {
        isDragging = false;
    });

    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        panX = e.clientX - startX;
        panY = e.clientY - startY;
        updateTransform();
    });

    viewport.addEventListener('wheel', (e) => {
        e.preventDefault();
        const zoomIntensity = 0.001;
        const delta = -e.deltaY * zoomIntensity;
        let newScale = scale * Math.exp(delta);
        newScale = Math.max(0.1, Math.min(newScale, 5));

        const rect = viewport.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;

        panX = mouseX - (mouseX - panX) * (newScale / scale);
        panY = mouseY - (mouseY - panY) * (newScale / scale);
        
        scale = newScale;
        updateTransform();
    }, { passive: false });

    window.zoom = function(amount) {
        let newScale = scale + amount;
        newScale = Math.max(0.1, Math.min(newScale, 5));
        const mouseX = window.innerWidth / 2;
        const mouseY = window.innerHeight / 2;
        panX = mouseX - (mouseX - panX) * (newScale / scale);
        panY = mouseY - (mouseY - panY) * (newScale / scale);
        scale = newScale;
        updateTransform();
    };

    window.resetView = function() {
        scale = 1;
        panX = 0;
        panY = 0;
        updateTransform();
    };

    updateTransform();

    const HEX_SIZE = 100; // Radius of hex
    const HEX_WIDTH = Math.sqrt(3) * HEX_SIZE;
    const HEX_HEIGHT = 2 * HEX_SIZE;

    // Fetch live map nodes
    fetch('/api/province_map/nodes')
        .then(res => res.json())
        .then(data => {
            if (data.status === 'success' && data.provinces && data.provinces.length > 0) {
                data.provinces.forEach(prov => {
                    const nodeEl = document.createElement('div');
                    nodeEl.className = 'hex-tile';
                    
                    // Axial to Pixel Coordinates (pointy-topped)
                    const q = prov.x;
                    const r = prov.y;
                    
                    const pixelX = HEX_SIZE * Math.sqrt(3) * (q + r/2);
                    const pixelY = HEX_SIZE * 3/2 * r;
                    
                    // Gap between hexes (optional, we can leave a tiny gap by multiplying by 1.02)
                    const spacing = 1.05;

                    nodeEl.style.left = (pixelX * spacing) + 'px';
                    nodeEl.style.top = (pixelY * spacing) + 'px';
                    
                    nodeEl.innerHTML = `
                        <h3>${prov.name}</h3>
                        <p>${prov.username}</p>
                        <p style="font-size: 0.65rem; color: #888;">Pop: ${prov.population.toLocaleString()}</p>
                    `;
                    
                    // Add click event to go to province page
                    nodeEl.onclick = () => {
                        window.location.href = `/province/${prov.id}`;
                    };
                    
                    canvas.appendChild(nodeEl);
                });
            } else {
                const nodeEl = document.createElement('div');
                nodeEl.className = 'hex-tile';
                nodeEl.style.left = '0px';
                nodeEl.style.top = '0px';
                nodeEl.innerHTML = `
                    <h3>Map Empty</h3>
                    <p>No provinces or no coordinates assigned yet.</p>
                `;
                canvas.appendChild(nodeEl);
            }
        })
        .catch(err => {
            console.error("Error loading nodes:", err);
            const nodeEl = document.createElement('div');
            nodeEl.className = 'hex-tile';
            nodeEl.style.left = '0px';
            nodeEl.style.top = '0px';
            nodeEl.innerHTML = `<h3>Error</h3><p>${err.message}</p>`;
            canvas.appendChild(nodeEl);
        });
</script>
{% endblock %}
