{% extends "layout.html" %}
{% block title %} Lore Map {% endblock %}
{% block body_class %}page-lore-map{% endblock %}

{% block head %}
<style>
    :root {
        --canvas-bg: #0b0e14;
        --grid-color: rgba(255, 255, 255, 0.04);
        --node-border: rgba(79, 195, 247, 0.3);
        --node-bg: rgba(18, 24, 38, 0.85);
        --node-glow: rgba(79, 195, 247, 0.4);
    }

    html, body.page-lore-map {
        margin: 0;
        overflow: hidden !important;
        background: var(--canvas-bg) !important;
        height: 100vh;
        font-family: 'Inter', sans-serif;
    }
    
    .templatecontainer, .navbarparent:has(.templatecontainer), #page-content-wrapper, .container-fluid, .body-content {
        background: transparent !important;
        padding: 0 !important;
        border: none !important;
        box-shadow: none !important;
        max-width: 100% !important;
        width: 100% !important;
        margin: 0 !important;
        min-height: 0 !important;
    }

    .footer, footer { display: none !important; }

    .templatedivtopper {
        position: fixed;
        top: 80px;
        left: 20px;
        z-index: 1000;
        background: rgba(10, 14, 20, 0.6);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 12px 24px;
        border-radius: 12px;
        pointer-events: auto;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    
    .templatedivtitle {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        color: #fff;
        margin: 0;
        font-size: 1.25rem;
        font-weight: 600;
        letter-spacing: 0.5px;
    }
    
    .templatedivtitle .material-icons-outlined {
        color: #4fc3f7;
    }

    #viewport {
        position: absolute;
        top: 0; left: 0;
        width: 100vw; height: 100vh;
        cursor: grab;
        background-color: var(--canvas-bg);
        background-image: 
            radial-gradient(circle at 50% 50%, rgba(20, 40, 70, 0.3) 0%, transparent 70%),
            radial-gradient(var(--grid-color) 1.5px, transparent 1.5px);
        background-size: 100% 100%, 50px 50px;
        background-position: 0 0, 0 0;
    }

    #viewport:active { cursor: grabbing; }

    #canvas {
        position: absolute;
        top: 50%; left: 50%;
        transform-origin: 0 0;
        width: 0; height: 0;
    }

    /* Map Controls UI */
    .map-controls {
        position: fixed;
        bottom: 40px;
        right: 40px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 1000;
    }

    .control-btn {
        background: rgba(15, 20, 30, 0.7);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #fff;
        width: 48px;
        height: 48px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
    }

    .control-btn:hover {
        background: rgba(79, 195, 247, 0.2);
        border-color: rgba(79, 195, 247, 0.5);
        transform: translateY(-2px);
    }

    /* Hex Tile Wrapper for shadows (clip-path hides box-shadows) */
    .hex-wrapper {
        position: absolute;
        width: 173.2px;
        height: 200px;
        transform: translate(-50%, -50%);
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.5));
        cursor: pointer;
        z-index: 1;
    }

    .hex-wrapper:hover {
        transform: translate(-50%, -50%) scale(1.08);
        z-index: 10;
        filter: drop-shadow(0 0 20px var(--node-glow));
    }

    /* The actual border layer */
    .hex-tile {
        position: absolute;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, rgba(79,195,247,0.7), rgba(40,80,120,0.3));
        clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    }

    /* The inner content layer */
    .hex-inner {
        position: absolute;
        inset: 2px; /* Border thickness */
        background: var(--node-bg);
        clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 20px;
        color: #fff;
        transition: all 0.3s ease;
    }

    .hex-wrapper:hover .hex-inner {
        background: rgba(25, 35, 55, 0.9);
    }
    
    .hex-wrapper:hover .hex-tile {
        background: linear-gradient(135deg, rgba(79,195,247,1), rgba(79,195,247,0.4));
    }

    .hex-inner h3 {
        margin: 0 0 6px 0;
        font-size: 0.95rem;
        color: #fff;
        font-weight: 700;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        text-shadow: 0 2px 8px rgba(79,195,247,0.5);
    }
    
    .hex-inner p.user {
        margin: 0 0 4px 0;
        font-size: 0.8rem;
        color: #4fc3f7;
        font-weight: 500;
    }

    .hex-inner p.pop {
        margin: 0;
        font-size: 0.7rem;
        color: #aaa;
        background: rgba(0,0,0,0.3);
        padding: 2px 8px;
        border-radius: 10px;
    }
</style>
{% endblock %}

{% block body %}
<div class="templatedivtopper">
    <h1 class="templatedivtitle">
        <span class="material-icons-outlined iconlarge">public</span>
        Province Map
    </h1>
</div>

<div id="viewport">
    <div id="canvas">
        <!-- Provinces will be injected here dynamically via JS -->
    </div>
</div>

<div class="map-controls">
    <button class="control-btn" onclick="zoom(0.2)" title="Zoom In"><span class="material-icons-outlined">add</span></button>
    <button class="control-btn" onclick="zoom(-0.2)" title="Zoom Out"><span class="material-icons-outlined">remove</span></button>
    <button class="control-btn" onclick="resetView()" title="Recenter"><span class="material-icons-outlined">my_location</span></button>
</div>

<script>
    const viewport = document.getElementById('viewport');
    const canvas = document.getElementById('canvas');

    let scale = 1;
    let panX = 0;
    let panY = 0;
    
    let isDragging = false;
    let startX = 0;
    let startY = 0;

    function updateTransform() {
        canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
        viewport.style.backgroundPosition = `0 0, ${panX}px ${panY}px`;
        viewport.style.backgroundSize = `100% 100%, ${50 * scale}px ${50 * scale}px`;
    }

    viewport.addEventListener('mousedown', (e) => {
        if (e.target.closest('.hex-wrapper') || e.target.closest('.control-btn')) return;
        isDragging = true;
        startX = e.clientX - panX;
        startY = e.clientY - panY;
    });

    window.addEventListener('mouseup', () => {
        isDragging = false;
    });

    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        panX = e.clientX - startX;
        panY = e.clientY - startY;
        updateTransform();
    });

    viewport.addEventListener('wheel', (e) => {
        e.preventDefault();
        const zoomIntensity = 0.001;
        const delta = -e.deltaY * zoomIntensity;
        let newScale = scale * Math.exp(delta);
        newScale = Math.max(0.1, Math.min(newScale, 4));

        const rect = viewport.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;

        panX = mouseX - (mouseX - panX) * (newScale / scale);
        panY = mouseY - (mouseY - panY) * (newScale / scale);
        
        scale = newScale;
        updateTransform();
    }, { passive: false });

    window.zoom = function(amount) {
        let newScale = scale + amount;
        newScale = Math.max(0.1, Math.min(newScale, 4));
        const mouseX = window.innerWidth / 2;
        const mouseY = window.innerHeight / 2;
        panX = mouseX - (mouseX - panX) * (newScale / scale);
        panY = mouseY - (mouseY - panY) * (newScale / scale);
        scale = newScale;
        updateTransform();
    };

    window.resetView = function() {
        scale = 1;
        panX = 0;
        panY = 0;
        updateTransform();
    };

    updateTransform();

    const HEX_SIZE = 100;
    const HEX_WIDTH = Math.sqrt(3) * HEX_SIZE;
    const HEX_HEIGHT = 2 * HEX_SIZE;

    // Fetch live map nodes
    fetch('/api/province_map/nodes')
        .then(async res => {
            if (!res.ok) {
                const text = await res.text();
                throw new Error(`HTTP ${res.status}: ${text}`);
            }
            return res.json();
        })
        .then(data => {
            if (data.status !== 'success') {
                throw new Error(data.message || "API returned non-success status");
            }
            if (data.provinces && data.provinces.length > 0) {
                data.provinces.forEach(prov => {
                    const wrapperEl = document.createElement('div');
                    wrapperEl.className = 'hex-wrapper';
                    
                    const q = prov.x;
                    const r = prov.y;
                    
                    const pixelX = HEX_SIZE * Math.sqrt(3) * (q + r/2);
                    const pixelY = HEX_SIZE * 3/2 * r;
                    
                    const spacing = 1.03; // tighter fit

                    wrapperEl.style.left = (pixelX * spacing) + 'px';
                    wrapperEl.style.top = (pixelY * spacing) + 'px';
                    
                    wrapperEl.innerHTML = `
                        <div class="hex-tile"></div>
                        <div class="hex-inner">
                            <h3>${prov.name}</h3>
                            <p class="user">${prov.username}</p>
                            <p class="pop">Pop: ${prov.population.toLocaleString()}</p>
                        </div>
                    `;
                    
                    wrapperEl.onclick = () => {
                        window.location.href = `/province/${prov.id}`;
                    };
                    
                    canvas.appendChild(wrapperEl);
                });
            } else {
                const wrapperEl = document.createElement('div');
                wrapperEl.className = 'hex-wrapper';
                wrapperEl.style.left = '0px';
                wrapperEl.style.top = '0px';
                wrapperEl.innerHTML = `
                    <div class="hex-tile" style="background: rgba(255,255,255,0.1)"></div>
                    <div class="hex-inner">
                        <h3 style="color:#aaa;">Map Empty</h3>
                        <p class="pop">No provinces assigned</p>
                    </div>
                `;
                canvas.appendChild(wrapperEl);
            }
        })
        .catch(err => {
            console.error("Error loading nodes:", err);
            const wrapperEl = document.createElement('div');
            wrapperEl.className = 'hex-wrapper';
            wrapperEl.style.left = '0px';
            wrapperEl.style.top = '0px';
            wrapperEl.innerHTML = `
                <div class="hex-tile" style="background: rgba(255,100,100,0.5)"></div>
                <div class="hex-inner">
                    <h3 style="color:#ff6b6b">Error</h3>
                    <p class="pop">Failed to load</p>
                    <p style="font-size:0.6rem;color:#ff6b6b;overflow:hidden;text-overflow:ellipsis;max-width:150px;white-space:nowrap;" title="${err.message.replace(/"/g, '&quot;')}">${err.message}</p>
                </div>
            `;
            canvas.appendChild(wrapperEl);
        });
</script>
{% endblock %}
