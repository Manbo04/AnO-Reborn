{% if FEATURE_PROVINCE_BASE_VIEW and province_base_layout %}
<section class="province-base-section" id="province-base-view" aria-label="Province command center"
    style="--province-biome-sky: {{ province_base_layout.biome.sky }}; --province-biome-ground: {{ province_base_layout.biome.ground }};">
    <div class="province-base-header">
        <h2><span class="material-icons-outlined">castle</span> {{ province['name'] }}</h2>
        <div class="province-base-vitals">
            <div class="province-vital">
                <span class="province-vital-label"><span class="material-icons-outlined">sentiment_satisfied</span> Happy</span>
                <div class="province-vital-bar"><div class="province-vital-fill province-vital-fill--happy" style="width: {{ [province_base_layout.happiness, 100]|min }}%;"></div></div>
            </div>
            <div class="province-vital">
                <span class="province-vital-label"><span class="material-icons-outlined">cloud</span> Pollution</span>
                <div class="province-vital-bar"><div class="province-vital-fill province-vital-fill--pollution" style="width: {{ [province_base_layout.pollution, 100]|min }}%;"></div></div>
            </div>
            <div class="province-vital">
                <span class="province-vital-label"><span class="material-icons-outlined">bolt</span> Power</span>
                <div class="province-vital-bar"><div class="province-vital-fill province-vital-fill--power" style="width: {{ [province_base_layout.electricity|default(0, true), 100]|min }}%;"></div></div>
            </div>
        </div>
        <button type="button" class="province-base-toggle" data-province-view-toggle aria-pressed="true">Classic view</button>
    </div>

    <div class="province-base-arena">
        <div class="province-base-particles" aria-hidden="true">
            <span></span><span></span><span></span><span></span><span></span>
        </div>
        {% include 'partials/province_base_slots.html' %}
    </div>

    <script id="province-base-data" type="application/json">{{ province_base_layout | tojson }}</script>
    <script id="province-base-meta" type="application/json">{"provinceId": {{ province['id'] }}, "own": {{ province_base_layout.own|tojson }} }</script>
</section>

<div class="province-base-slot-sheet" id="province-base-slot-sheet" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="province-base-sheet-backdrop" data-slot-sheet-close></div>
    <div class="province-base-sheet-panel">
        <div class="province-base-sheet-header">
            <div class="province-base-sheet-icon" data-sheet-icon-wrap>
                <span class="material-icons-outlined" data-sheet-icon>category</span>
            </div>
            <div>
                <h3 class="province-base-sheet-title" data-slot-title>Category</h3>
                <p class="province-base-sheet-sub" data-slot-sub></p>
            </div>
            <button type="button" class="province-base-sheet-close" data-slot-sheet-close aria-label="Close">
                <span class="material-icons-outlined">close</span>
            </button>
        </div>
        <div class="province-base-building-list" data-building-list role="list"></div>
        <div class="province-base-sheet-footer">
            <button type="button" class="templatedivbutton templatecenteredbutton" data-slot-classic>Full builder</button>
            <button type="button" class="templatedivbutton templatecenteredbutton" data-slot-sheet-close>Close</button>
        </div>
    </div>
</div>
<div class="province-base-toast" id="province-base-toast" role="status"></div>
{% endif %}
