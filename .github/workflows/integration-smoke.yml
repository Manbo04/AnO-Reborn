name: Integration smoke

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - "**.py"
      - "templates/**"
      - ".github/workflows/integration-smoke.yml"

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_PUBLIC_URL || secrets.DATABASE_URL }}
      DATABASE_PUBLIC_URL: ${{ secrets.DATABASE_PUBLIC_URL || secrets.DATABASE_URL }}
      PG_DATABASE: ano
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Skip when no production DB secret
        id: db
        run: |
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "has_db=false" >> "$GITHUB_OUTPUT"
            echo "::warning::DATABASE_PUBLIC_URL not configured — skipping integration smoke"
          else
            echo "has_db=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Schema diagnose
        if: steps.db.outputs.has_db == 'true'
        env:
          SMOKE_STRICT_REVENUE_AGE: "0"
        run: python3 scripts/diagnose_schema.py

      - name: Route SQL diagnose (test user 16)
        if: steps.db.outputs.has_db == 'true'
        run: python3 scripts/diagnose_all_routes.py 16

      - name: DB integration tests
        if: steps.db.outputs.has_db == 'true'
        run: |
          python -m pytest \
            tests/test_country_page_route.py \
            tests/test_account_page.py \
            tests/test_countries_page.py \
            tests/test_coalitions_bank_flow.py \
            tests/test_statistics_components.py \
            tests/test_war_peace_authorization.py \
            -q --tb=short
