name: Tutorial walkthrough videos

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - "templates/tutorial.html"
      - "templates/tutorial_chapter_extras.html"
      - "static/tutorial/**"
      - "scripts/record_tutorial_walkthroughs.py"
      - "scripts/generate_tutorial_narration.py"
      - "scripts/generate_tutorial_videos.py"
      - "province.py"
      - "countries.py"
      - "market.py"
      - "templates/country.html"
      - "templates/province.html"
      - "templates/market.html"
      - "app.py"

jobs:
  record-and-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python tools
        run: |
          python -m pip install --upgrade pip
          pip install playwright psycopg2-binary bcrypt edge-tts python-dotenv requests
          playwright install chromium

      - name: Generate narration
        run: python3 scripts/generate_tutorial_narration.py

      - name: Record walkthroughs with narration
        env:
          DATABASE_PUBLIC_URL: ${{ secrets.DATABASE_PUBLIC_URL }}
          TUTORIAL_RECORD_BASE_URL: ${{ vars.TUTORIAL_RECORD_BASE_URL || 'https://affairsandorder.com' }}
          TUTORIAL_RECORD_TMP_PASSWORD: ${{ secrets.TUTORIAL_RECORD_TMP_PASSWORD }}
        run: python3 scripts/record_tutorial_walkthroughs.py --with-narration
        continue-on-error: true

      - name: Mux narration into existing videos if record failed
        if: failure()
        run: python3 scripts/record_tutorial_walkthroughs.py --narration-only --with-narration

      - name: Upload video artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tutorial-videos
          path: static/tutorial/videos/*.mp4
          retention-days: 14

      - name: Create pull request with updated videos
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: refresh Nation Academy tutorial walkthrough videos"
          title: "chore: refresh tutorial walkthrough videos"
          body: |
            Automated refresh of Nation Academy chapter MP4s (screen capture + TTS narration).

            Generated by [.github/workflows/tutorial-videos.yml](.github/workflows/tutorial-videos.yml).
            Merge to deploy new assets to Railway.
          branch: bot/tutorial-videos
          delete-branch: true
          add-paths: |
            static/tutorial/videos/
            static/tutorial/audio/
            static/tutorial/captions/
