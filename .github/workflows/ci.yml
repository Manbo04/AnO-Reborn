name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check error() argument order in routes
        run: python scripts/check_error_call_order.py

      - name: Check template JSON.parse safety
        run: python3 scripts/check_template_json_blocks.py

      - name: Check legacy schema references in app code
        run: python3 scripts/check_legacy_schema_refs.py

      - name: Check auth forms include CSRF token
        run: python3 scripts/check_csrf_forms.py

      - name: Progression health (strict when DB secret present)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_PUBLIC_URL || secrets.DATABASE_URL }}
          DATABASE_PUBLIC_URL: ${{ secrets.DATABASE_PUBLIC_URL || secrets.DATABASE_URL }}
        run: |
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "SKIP progression_health_check (no DATABASE_URL secret)"
            exit 0
          fi
          python3 scripts/progression_health_check.py

      - name: Bundle game UI CSS and verify
        run: |
          python3 scripts/bundle_game_css.py
          python3 scripts/check_game_css_bundle.py
          python3 scripts/generate_asset_manifest.py

      - name: Progression balance audit (static)
        run: python scripts/progression_balance_audit.py

      - name: Run targeted pytest (no DB required)
        run: |
          python -m pytest \
            tests/test_error_handler_status.py::test_error_returns_numeric_http_status \
            tests/test_error_handler_status.py::test_error_500_status \
            tests/test_error_handler_status.py::test_swapped_error_args_produce_invalid_status \
            tests/test_error_handler_status.py::test_all_templates_compile \
            tests/test_error_handler_status.py::test_signup_missing_password_returns_400 \
            tests/test_import_app.py::test_import_app \
            tests/test_country_policies.py \
            tests/test_game_ui.py \
            tests/test_game_css_bundle.py \
            tests/test_progression_milestones.py::test_progression_balance_audit_script_exits_zero \
            tests/test_progression_milestones.py::test_gas_station_price_matches_variables \
            tests/test_revenue_commit_path.py \
            tests/test_distribution_status.py \
            tests/test_database_auto_rollback.py \
            tests/test_province_demographics_fallback.py \
            tests/test_login_post.py \
            tests/test_validate_post_origin.py \
            -q --tb=short

  integration-db:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/anodb
      PG_HOST: 127.0.0.1
      PG_PORT: 5432
      PG_USER: postgres
      PG_PASSWORD: postgres
      PG_DATABASE: anodb
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: anodb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Initialize DB schema
        run: python init_db_railway.py

      - name: Apply schema compatibility
        run: |
          python scripts/apply_schema_compat.py
          psql $DATABASE_URL -f migrations/0002_normalize_economy_military.sql || true
          psql $DATABASE_URL -f migrations/0003_normalize_diplomacy_market.sql || true
          psql $DATABASE_URL -f migrations/0004_normalize_infrastructure_tech.sql || true
          psql $DATABASE_URL -f migrations/0005_finalize_normalized_cleanup.sql || true
          psql $DATABASE_URL -f migrations/0007_seed_unit_dictionary.sql || true
          python scripts/apply_all_pending_migrations.py

      - name: Run DB-backed coalition and schema tests
        run: |
          python -m pytest \
            tests/test_coalition_membership_guard.py \
            tests/test_schema_compat_helpers.py \
            tests/test_my_coalition_empty.py \
            -q --tb=short
