# Redeploy web + celery-worker after master push (cost-optimized: no Postgres/beat/bot).
# Requires repository secret: RAILWAY_TOKEN

name: Redeploy game stack

on:
  push:
    branches: [master]
    paths:
      - "**.py"
      - "static/**"
      - "templates/**"
      - "tasks.py"
      - "Procfile"
      - "railway.json"
      - "scripts/start_production.sh"
      - "scripts/nudge_stale_economy_tasks.py"
      - "scripts/run_beat_if_leader.py"
      - "scripts/railway_production_fix.py"
      - "wsgi.py"
      - "database.py"
      - ".github/workflows/railway-redeploy-stack.yml"

concurrency:
  group: railway-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Redeploy web and celery-worker on Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "${RAILWAY_TOKEN:-}" ]; then
            echo "::warning::RAILWAY_TOKEN not set — only GitHub-linked service may deploy"
            exit 0
          fi
          python3 scripts/railway_production_fix.py --redeploy-only --services web,celery-worker
